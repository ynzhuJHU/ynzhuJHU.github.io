<!-- Typography -->
<style>
body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
               Roboto, Helvetica, Arial, sans-serif;
  font-size: 16.5px;
  line-height: 1.65;
  color: #222;
}

h1, h2, h3, h4 {
  font-family: "Source Serif 4", Georgia, serif;
  font-weight: 500;
  letter-spacing: -0.01em;
}

h1 {
  font-size: 2.2rem;
}

h2 {
  font-size: 1.7rem;
  margin-top: 2.5rem;
}

a {
  color: #1a4fa3;
}

a:hover {
  text-decoration: underline;
}

.paper-box-text {
  font-size: 15.5px;
  line-height: 1.6;
}

/* Paragraph rhythm */
p {
  margin-bottom: 1.0em;
}

/* Lists */
ul, ol {
  margin-bottom: 1.25em;
}

/* Section separation */
h1, h2 {
  margin-bottom: 0.6em;
}

/* Publication boxes spacing */
.paper-box {
  margin-bottom: 0.001rem;
}

/* Education & custom lists */
.edu-box {
  margin-bottom: 0.8rem;
}


/* Option C: subtle small-caps headers */
h1, h2 {
  font-variant-caps: small-caps;
  letter-spacing: 0.04em;
}

/* Publication title styling */
.paper-box-text > p > a,
.paper-box-text > a {
  font-size: 1.15rem;       /* ~18.5px */
  font-weight: 500;
  line-height: 1.35;
  display: inline-block;
  margin-bottom: 0.3rem;
}

/* Reduce top margin of first publication */
.paper-box:first-of-type {
  margin-top: 0.005rem;
}

/* Justified body text */
p {
  text-align: justify;
  text-justify: inter-word;
}

/* Publication text block */
.paper-box-text {
  text-align: justify;
}

/* Publication titles should NOT be justified */
.paper-box-text > p > a,
.paper-box-text > a {
  text-align: left;
  display: inline-block;
}


/* Bullet points: justify text, keep bullets aligned */
.paper-box-text ul {
  padding-left: 1.2em;
}

.paper-box-text li {
  text-align: justify;
  text-justify: inter-word;
  line-height: 1.35;     /* 🔹 tighter than body */
}

/* Publication titles: larger + bold (refined) */
.paper-box-text > p > a,
.paper-box-text > a {
  font-family: "Source Serif 4", Georgia, serif;
  font-size: 1.28rem;     /* slightly larger */
  font-weight: 650;      /* strong but scholarly */
  line-height: 1.35;
  letter-spacing: -0.012em;
  color: #111;
}


/* Intro text: serif narrative style (force override theme) */
.page__content .intro-text,
.layout--single .intro-text {
  font-family: "Source Serif 4", Georgia, serif !important;
  font-size: 1.05rem;
  line-height: 1.5;
}

/* Make "News" link smaller and subtle */
.paper-box-text a[href*="news"],
.paper-box-text a[href*="hub.jhu.edu"],
.paper-box-text a[href*="engineering.jhu.edu"],
.paper-box-text a[href*="inbt.jhu.edu"] {
  font-size: 0.9rem;
  font-weight: 400;
  color: #555;
  margin-right: 0.4rem;
}



/* ===== FINAL OVERRIDES (put at very bottom) ===== */

/* Publication titles: bigger + bold + serif */
.paper-box-text p > a:first-child {
  font-family: "Source Serif 4", Georgia, serif !important;
  font-size: 1.2rem !important;   /* larger than your current 1.28rem */
  font-weight: 600 !important;     /* bold */
  line-height: 1.7 !important;
  letter-spacing: -0.012em;
  color: #4a6fae !important;
  text-decoration-thickness: 1px;
  text-underline-offset: 2px;
}

/* Make sure only the title gets this (not other links inside paper text) */
.paper-box-text p > a:first-child + * {
  font-size: inherit;
}

/* Publication press/news links */
.paper-box-text a[href*="hub.jhu.edu"],
.paper-box-text a[href*="engineering.jhu.edu"],
.paper-box-text a[href*="inbt.jhu.edu"],
.paper-box-text a[href*="jhu.edu"] {
  font-size: 0.95rem;
  font-weight: 600;
  color: #1f57c3;
  text-decoration: underline;
  text-underline-offset: 2px;
}


/* Publications header */
.pub-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 2.5rem;
  margin-bottom: 1.2rem;
}

.pub-header h2 {
  margin: 0;
}

/* Mobile: stack vertically */
@media (max-width: 768px) {
  .pub-header {
    flex-direction: column;
    align-items: flex-start;
    gap: 0.6rem;
  }
}

/* Make Selected Publications header match other subtitles */
.pub-header h2 {
  font-family: "Source Serif 4", Georgia, serif;
  font-variant-caps: small-caps;
  letter-spacing: 0.04em;
  font-weight: 500;
  font-size: 2.2rem;
}

/* ===== Hero banner with top-right research keywords ===== */
.hero-banner {
  position: relative;
  width: 100%;
  height: 300px;
  overflow: hidden;
  border-radius: 12px;
  margin-bottom: 30px;
}

.hero-banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 35%;
  display: block;
}

/* Text overlay (top-right corner) */
.hero-overlay-text {
  position: absolute;
  top: 18px;
  right: 22px;
  text-align: right;
  font-family: "Source Serif 4", Georgia, serif;
  font-size: 1.4rem;
  font-weight: 500;
  line-height: 1.6;
  color: #ffffff;
  letter-spacing: 0.02em;
}

/* Each word on its own line */
.hero-overlay-text span {
  display: block;
}

/* Subtle readability enhancement */
.hero-overlay-text {
  text-shadow: 0 2px 6px rgba(0,0,0,0.35);
}

/* Mobile: slightly smaller text */
@media (max-width: 768px) {
  .hero-overlay-text {
    font-size: 0.95rem;
    top: 14px;
    right: 16px;
  }
}

/* ===== Masthead navigation ===== */
.masthead,
.masthead__menu,
.masthead__menu-item a,
.masthead-dropdown-trigger,
.site-nav-modern a {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
}

.masthead {
  position: sticky;
  top: 0;
  z-index: 1000;
  overflow: visible;
  border-bottom: 1px solid rgba(20, 32, 56, 0.08);
  background: rgba(255, 255, 255, 0.94);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 8px 24px rgba(20, 32, 56, 0.05);
}

.masthead__inner-wrap,
#main {
  margin-left: auto !important;
  margin-right: auto !important;
}

.masthead__inner-wrap,
.masthead__menu,
.site-nav-modern,
.site-nav-modern .visible-links {
  overflow: visible;
}

.site-nav-modern {
  display: block !important;
  padding: 0.18rem;
  border: 1px solid rgba(20, 32, 56, 0.08);
  border-radius: 8px;
  background: transparent !important;
  box-shadow: 0 6px 18px rgba(20, 32, 56, 0.04);
}

.site-nav-modern .visible-links {
  display: flex !important;
  align-items: center;
  gap: 0.15rem;
  margin: 0;
  padding: 0;
  list-style: none;
  visibility: visible !important;
  opacity: 1 !important;
}

.masthead__menu-home-item,
.masthead__menu-item {
  display: block !important;
}

.masthead__menu-item {
  position: relative;
}

.masthead__menu-item--dropdown::after {
  content: "";
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  height: 12px;
}

.masthead__menu-item a,
.masthead-dropdown-trigger {
  display: block !important;
  margin: 0 0.15rem !important;
  padding: 0.56rem 0.95rem !important;
  border: 0;
  border-radius: 8px;
  background: transparent;
  color: #4b5563 !important;
  cursor: pointer;
  font-size: 0.92rem !important;
  font-weight: 650;
  letter-spacing: 0;
  line-height: 1;
  text-decoration: none !important;
  transition: background 0.18s ease, color 0.18s ease;
}

.masthead-dropdown-trigger::after {
  content: "";
  display: inline-block;
  width: 0.42rem;
  height: 0.42rem;
  margin-left: 0.46rem;
  border-right: 2px solid currentColor;
  border-bottom: 2px solid currentColor;
  transform: translateY(-0.14rem) rotate(45deg);
  transition: transform 0.22s ease;
}

.masthead__menu-item--dropdown:hover .masthead-dropdown-trigger::after,
.masthead__menu-item--dropdown:focus-within .masthead-dropdown-trigger::after {
  transform: translateY(0.05rem) rotate(225deg);
}

.masthead__menu-item a:hover,
.masthead-dropdown-trigger:hover,
.masthead__menu-item--dropdown:focus-within .masthead-dropdown-trigger {
  background: #eef5ff;
  color: #1f57c3 !important;
}

.masthead__menu-item a:focus-visible,
.masthead-dropdown-trigger:focus-visible {
  outline: 2px solid rgba(31, 87, 195, 0.35);
  outline-offset: 2px;
}

.masthead-submenu {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  z-index: 50;
  min-width: 238px;
  margin: 0;
  padding: 9px;
  border: 1px solid rgba(31, 87, 195, 0.12);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: 0 18px 42px rgba(20, 32, 56, 0.16), 0 2px 6px rgba(20, 32, 56, 0.06);
  list-style: none;
  transform-origin: top left;
  opacity: 0;
  pointer-events: none;
  visibility: hidden;
  transform: translateY(-6px) scale(0.98);
  transition: opacity 384ms ease, transform 384ms ease, visibility 384ms ease;
}

.masthead__menu-item--dropdown:hover .masthead-submenu,
.masthead__menu-item--dropdown:focus-within .masthead-submenu {
  opacity: 1;
  pointer-events: auto;
  visibility: visible;
  transform: translateY(0) scale(1);
  animation: mastheadMenuIn 432ms ease both;
}

.masthead-submenu::before {
  content: "";
  position: absolute;
  top: -6px;
  left: 24px;
  width: 10px;
  height: 10px;
  border-top: 1px solid rgba(31, 87, 195, 0.12);
  border-left: 1px solid rgba(31, 87, 195, 0.12);
  background: rgba(255, 255, 255, 0.92);
  transform: rotate(45deg);
}

.masthead-submenu li {
  margin: 0;
}

.masthead__menu-item--dropdown:hover .masthead-submenu > li,
.masthead__menu-item--dropdown:focus-within .masthead-submenu > li {
  animation: mastheadItemIn 432ms ease both;
}

.masthead__menu-item--dropdown:hover .masthead-submenu > li:nth-child(1),
.masthead__menu-item--dropdown:focus-within .masthead-submenu > li:nth-child(1) {
  animation-delay: 84ms;
}

.masthead__menu-item--dropdown:hover .masthead-submenu > li:nth-child(2),
.masthead__menu-item--dropdown:focus-within .masthead-submenu > li:nth-child(2) {
  animation-delay: 168ms;
}

.masthead__menu-item--dropdown:hover .masthead-submenu > li:nth-child(3),
.masthead__menu-item--dropdown:focus-within .masthead-submenu > li:nth-child(3) {
  animation-delay: 252ms;
}

.masthead__menu-item--dropdown:hover .masthead-submenu > li:nth-child(4),
.masthead__menu-item--dropdown:focus-within .masthead-submenu > li:nth-child(4) {
  animation-delay: 336ms;
}

.masthead__menu-item--dropdown:hover .masthead-submenu > li:nth-child(5),
.masthead__menu-item--dropdown:focus-within .masthead-submenu > li:nth-child(5) {
  animation-delay: 420ms;
}

.masthead__menu-item--dropdown:hover .masthead-submenu > li:nth-child(6),
.masthead__menu-item--dropdown:focus-within .masthead-submenu > li:nth-child(6) {
  animation-delay: 504ms;
}

.masthead__menu-item--dropdown:hover .masthead-submenu-group li,
.masthead__menu-item--dropdown:focus-within .masthead-submenu-group li {
  animation: mastheadItemIn 384ms ease both;
}

.masthead__menu-item--dropdown:hover .masthead-submenu-group li:nth-child(1),
.masthead__menu-item--dropdown:focus-within .masthead-submenu-group li:nth-child(1) {
  animation-delay: 288ms;
}

.masthead__menu-item--dropdown:hover .masthead-submenu-group li:nth-child(2),
.masthead__menu-item--dropdown:focus-within .masthead-submenu-group li:nth-child(2) {
  animation-delay: 372ms;
}

.masthead__menu-item--dropdown:hover .masthead-submenu-group li:nth-child(3),
.masthead__menu-item--dropdown:focus-within .masthead-submenu-group li:nth-child(3) {
  animation-delay: 456ms;
}

.masthead-submenu-group {
  padding: 3px 0 4px 0;
}

.masthead-submenu-group > ul {
  margin: 2px 0 3px 8px;
  padding: 3px 0 3px 10px;
  border-left: 2px solid rgba(31, 87, 195, 0.16);
  list-style: none;
}

.masthead__menu-item .masthead-submenu a {
  position: relative;
  margin: 0 !important;
  padding: 0.62rem 0.76rem !important;
  color: #4b5563 !important;
  font-size: 0.84rem !important;
  line-height: 1.2;
  white-space: nowrap;
  transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
}

.masthead__menu-item .masthead-submenu-group > ul a {
  padding: 0.46rem 0.72rem !important;
  color: #5d6675 !important;
  font-size: 0.8rem !important;
}

.masthead__menu-item .masthead-submenu a:hover {
  background: #eef5ff;
  color: #1f57c3 !important;
  transform: translateX(3px);
}

.masthead__menu-item .masthead-submenu a:focus-visible {
  outline-offset: -1px;
}

@keyframes mastheadMenuIn {
  from {
    opacity: 0;
    transform: translateY(-6px) scale(0.98);
  }

  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes mastheadItemIn {
  from {
    opacity: 0;
    transform: translateY(-7px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 760px) {
  .site-nav-modern .visible-links {
    flex-wrap: wrap;
  }

  .masthead-submenu {
    position: static;
    min-width: min(260px, calc(100vw - 40px));
    margin: 6px 0.15rem 0 0.15rem;
  }
}

@media (prefers-reduced-motion: reduce) {
  .masthead-submenu {
    animation: none;
  }

  .masthead__menu-item--dropdown:hover .masthead-submenu > li,
  .masthead__menu-item--dropdown:focus-within .masthead-submenu > li,
  .masthead__menu-item--dropdown:hover .masthead-submenu-group li,
  .masthead__menu-item--dropdown:focus-within .masthead-submenu-group li,
  .masthead__menu-item .masthead-submenu a,
  .masthead-dropdown-trigger::after {
    transition: none;
    animation: none;
  }

  .masthead__menu-item .masthead-submenu a:hover {
    transform: none;
  }
}

.site-nav-modern .visible-links a:before {
  display: none !important;
}


/* ===== Sidebar / Author profile ===== */
.sidebar {

.hero h3 {
