name: Update Google Scholar Citations

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/google_scholar_citations.yml"
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install updater dependencies
        run: python -m pip install -r scripts/requirements-scholar.txt

      - name: Fetch Google Scholar citations
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        run: python scripts/update_scholar_citations.py --source serpapi --fail-on-fetch-error

      - name: Commit updated citation data
        run: |
          if git diff --quiet -- _data/scholar_citations.json; then
            echo "Citation data is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/scholar_citations.json
          git commit -m "Update Google Scholar citation data"
          git push
